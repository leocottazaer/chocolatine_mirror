name: Chocolatine
run-name: ${{ github.actor }} is testing out GitHub Actions 🚀

on:
  push:
    branches-ignore:
      - 'no-ga/*'
  pull_request:
    branches-ignore:
      - 'no-ga/*'

jobs:
  check_compilation_and_coding_style:
    container: epitechcontent/epitest-docker
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Checkout code
        run: banana-check-repo

      - name: Make code
        run: make
        timeout-minutes: 2

      - name: Diplay error
        run: |
          if [ ! -f coding-style-reports.log ]; then
            exit 0
          fi
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            file=$(echo "$line" | cut -d: -f1)
            line_nb=$(echo "$line" | cut -d: -f2)
            error_type=$(echo "$line" | cut -d: -f3)
            error_code=$(echo "$line" | cut -d: -f4)
            message=$(echo "$line" | cut -d: -f5-)
            echo "::error file=${file},line=${line_nb},title=${error_type} ${error_code}::${message}"
          done < coding-style-reports.log

      - name: Fail coding error
        run: |
          if [ -s coding-style-reports.log ]; then
            exit 1
          fi

      - name: clean code
        run: make clean

      - name: check exec
        run: |
          IFS=',' read -ra executables <<< "$EXECUTABLES"
          failed=0
          for exe in "${executables[@]}"; do
            exe=$(echo "$exe" | tr -d ' ')
            if [ ! -e "$exe" ]; then
              echo "::error file=${exe},title=Missing executable::${exe} does not exist"
              failed=1
            elif [ ! -x "$exe" ]; then
              echo "::error file=${exe},title=Non-executable::${exe} is not executable"
              failed=1
            fi
          done
          exit $failed
