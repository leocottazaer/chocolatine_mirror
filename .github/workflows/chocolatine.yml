name: chocolatine

on:
  push:
    branches-ignore:
      - 'no-ga/**'
  pull_request:
    branches-ignore:
      - 'no-ga/**'

env:
  MIRROR_SSH_URL: "git@github.com:leocottazaer/chocolatine_mirror.git"
  EXECUTABLES: "mysh"

jobs:
  check_compilation_and_coding_style:
    runs-on: ubuntu-latest
    container:
      image: epitechcontent/epitest-docker:latest
    if: github.repository != 'EpitechPGE1-2025/G-DOP-200-LYN-2-1-chocolatine-1'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check coding style
        run: banana-check-repo

      - name: Display style errors
        run: |
          while read line; do
            FILE=$(echo "$line" | cut -d':' -f1)
            LINE=$(echo "$line" | cut -d':' -f2)
            TYPE=$(echo "$line" | cut -d':' -f3)
            CODE=$(echo "$line" | cut -d':' -f4)
            echo "::error file=$FILE,line=$LINE,title=$TYPE coding style error::$CODE"
          done < coding-style-reports.log
          if [ -s coding-style-reports.log ]; then
            exit 1
          fi

      - name: Compile repository
        run: make
        env:
          CC: epiclang
        timeout-minutes: 2

      - name: Clean repository
        run: make clean

      - name: Check executables
        run: |
          IFS=',' read -ra ADDR <<< "$EXECUTABLES"
          for exe in "${ADDR[@]}"; do
            if [ ! -x "$exe" ]; then
              echo "::error file=$exe,title=Executable error::Binary '$exe' is missing or not executable"
              exit 1
            fi
          done

  run_tests:
    runs-on: ubuntu-latest
    needs: check_compilation_and_coding_style
    container:
      image: epitechcontent/epitest-docker:latest
    timeout-minutes: 2
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Run tests
        run: make tests_run

  push_to_mirror:
    runs-on: ubuntu-latest
    needs: run_tests
    if: github.event_name == 'push'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Push to mirror
        uses: pixta-dev/repository-mirroring-action@v1
        with:
          target_repo_url: ${{ env.MIRROR_SSH_URL }}
          ssh_private_key: ${{ secrets.GIT_SSH_PRIVATE_KEY }}